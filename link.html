<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日央水原 SUNWATER — 遊戲交易服務商</title>
    <meta name="description" content="日央水原商行 — 專業遊戲虛寶交易服務商，安全交易、即時到帳">
    <meta property="og:title" content="日央水原 SUNWATER">
    <meta property="og:description" content="專業遊戲虛寶交易服務商 — 安全交易・即時到帳">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy-deep: #060d1a;
            --navy: #1B3A5C;
            --navy-mid: #0f2340;
            --gold: #C8963E;
            --gold-light: #e8be6a;
            --gold-bright: #f0d090;
            --gold-glow: rgba(200, 150, 62, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-bg-strong: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-hover-border: rgba(200, 150, 62, 0.6);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans TC', 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background: var(--navy-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* === BACKGROUND LAYERS === */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(27, 58, 92, 0.5) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 20% 80%, rgba(200, 150, 62, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(27, 58, 92, 0.3) 0%, transparent 50%),
                linear-gradient(180deg, var(--navy-deep) 0%, #0a1a30 50%, var(--navy-deep) 100%);
        }

        /* Animated orbs */
        .orb {
            position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0;
            animation: orbPulse 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 300px; height: 300px; top: -80px; left: -60px;
            background: radial-gradient(circle, rgba(200, 150, 62, 0.2), transparent 70%);
            animation-delay: 0s;
        }
        .orb-2 {
            width: 250px; height: 250px; bottom: 10%; right: -80px;
            background: radial-gradient(circle, rgba(27, 58, 92, 0.5), transparent 70%);
            animation-delay: 3s;
        }
        .orb-3 {
            width: 200px; height: 200px; top: 40%; left: -50px;
            background: radial-gradient(circle, rgba(200, 150, 62, 0.1), transparent 70%);
            animation-delay: 5s;
        }

        @keyframes orbPulse {
            0%, 100% { opacity: 0.4; transform: scale(1) translate(0, 0); }
            50% { opacity: 0.8; transform: scale(1.15) translate(10px, -10px); }
        }

        /* Particle stars */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }
        .particle {
            position: absolute; width: 2px; height: 2px; background: rgba(255, 255, 255, 0.6);
            border-radius: 50%; animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Grid lines (subtle tech feel) */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
            opacity: 0.03;
            background-image:
                linear-gradient(rgba(200, 150, 62, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 150, 62, 0.3) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black 0%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black 0%, transparent 70%);
        }

        /* === CONTAINER === */
        .container {
            position: relative; z-index: 2; width: 100%; max-width: 400px;
            padding: 48px 24px 48px; display: flex; flex-direction: column; align-items: center;
        }

        /* === BRAND HERO === */
        .brand-hero {
            text-align: center; margin-bottom: 32px; position: relative;
        }

        .logo-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 150, 62, 0.15) 0%, transparent 70%);
            filter: blur(30px); pointer-events: none;
            animation: logoGlow 4s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -60%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
        }

        .logo-container {
            width: 120px; height: 120px; margin: 0 auto 20px; position: relative;
            border-radius: 50%; overflow: hidden;
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.15), rgba(27, 58, 92, 0.3));
            border: 1.5px solid rgba(200, 150, 62, 0.25);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 40px rgba(200, 150, 62, 0.1),
                0 0 80px rgba(200, 150, 62, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInScale 0.8s ease-out;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-container img {
            width: 90%; height: 90%; object-fit: contain;
        }

        .logo-container svg {
            width: 80px; height: 80px;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .brand-text {
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .brand-en {
            font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 700;
            letter-spacing: 6px; margin-bottom: 6px;
            background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .brand-cn {
            font-size: 14px; font-weight: 400; color: var(--text-secondary);
            letter-spacing: 10px; margin-bottom: 12px;
        }

        .brand-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--gold-light); letter-spacing: 2px;
            padding: 5px 18px; border-radius: 20px;
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.12), rgba(200, 150, 62, 0.05));
            border: 1px solid rgba(200, 150, 62, 0.2);
            backdrop-filter: blur(10px);
        }

        .badge-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: var(--gold); box-shadow: 0 0 6px var(--gold-glow);
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Decorative line */
        .divider-line {
            width: 60px; height: 1px; margin: 24px auto 28px;
            background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        /* === LINK CARDS === */
        .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }

        .link-card {
            display: flex; align-items: center; gap: 14px;
            width: 100%; padding: 14px 18px; border-radius: 14px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none; color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative; overflow: hidden;
        }

        /* Shimmer effect on hover */
        .link-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(200, 150, 62, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .link-card::after {
            content: ''; position: absolute; inset: 0; border-radius: 14px;
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.06), transparent 50%);
            opacity: 0; transition: opacity 0.4s ease;
        }

        .link-card:hover {
            border-color: rgba(200, 150, 62, 0.4);
            transform: translateY(-3px) scale(1.01);
            box-shadow:
                0 8px 30px rgba(200, 150, 62, 0.12),
                0 2px 10px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.04));
        }

        .link-card:hover::before { left: 100%; }
        .link-card:hover::after { opacity: 1; }
        .link-card:active { transform: translateY(-1px) scale(1.005); }

        .link-icon {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; position: relative; z-index: 1;
            transition: transform 0.3s ease;
        }

        .link-card:hover .link-icon { transform: scale(1.08); }

        .link-icon svg { width: 22px; height: 22px; }

        .link-content { flex: 1; position: relative; z-index: 1; }
        .link-title { font-size: 14px; font-weight: 600; margin-bottom: 1px; letter-spacing: 0.5px; }
        .link-desc { font-size: 10.5px; color: var(--text-secondary); letter-spacing: 0.3px; }

        .link-arrow {
            color: rgba(255,255,255,0.25); transition: all 0.35s ease; position: relative; z-index: 1;
        }
        .link-card:hover .link-arrow { color: var(--gold); transform: translateX(4px); }

        /* Icon styles */
        .icon-trade {
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.25), rgba(200, 150, 62, 0.08));
            box-shadow: 0 0 15px rgba(200, 150, 62, 0.1);
        }
        .icon-web {
            background: linear-gradient(135deg, rgba(27, 58, 92, 0.5), rgba(42, 80, 128, 0.2));
            box-shadow: 0 0 15px rgba(27, 58, 92, 0.2);
        }
        .icon-line {
            background: linear-gradient(135deg, rgba(6, 199, 85, 0.25), rgba(6, 199, 85, 0.08));
            box-shadow: 0 0 15px rgba(6, 199, 85, 0.1);
        }
        .icon-meta {
            background: linear-gradient(135deg, rgba(24, 119, 242, 0.25), rgba(24, 119, 242, 0.08));
            box-shadow: 0 0 15px rgba(24, 119, 242, 0.1);
        }
        .icon-ig {
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.25), rgba(131, 58, 180, 0.15));
            box-shadow: 0 0 15px rgba(225, 48, 108, 0.1);
        }
        .icon-kyc {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.25), rgba(16, 185, 129, 0.08));
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        /* Staggered animation */
        .link-card:nth-child(1) { animation: cardSlideIn 0.5s ease-out 0.15s both; }
        .link-card:nth-child(2) { animation: cardSlideIn 0.5s ease-out 0.25s both; }
        .link-card:nth-child(3) { animation: cardSlideIn 0.5s ease-out 0.35s both; }
        .link-card:nth-child(4) { animation: cardSlideIn 0.5s ease-out 0.45s both; }
        .link-card:nth-child(5) { animation: cardSlideIn 0.5s ease-out 0.55s both; }
        .link-card:nth-child(6) { animation: cardSlideIn 0.5s ease-out 0.65s both; }

        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === FOOTER === */
        .footer {
            margin-top: 36px; text-align: center;
            animation: fadeInUp 0.5s ease-out 0.9s both;
        }

        .footer-divider {
            width: 30px; height: 1px; margin: 0 auto 12px;
            background: linear-gradient(90deg, transparent, rgba(200, 150, 62, 0.3), transparent);
        }

        .footer-text {
            font-size: 10px; color: rgba(255, 255, 255, 0.2); letter-spacing: 1.5px; font-weight: 300;
        }

        /* === SPARKLE DECORATIONS === */
        .sparkle {
            position: absolute; pointer-events: none;
        }
        .sparkle svg { filter: drop-shadow(0 0 3px rgba(200, 150, 62, 0.5)); }

        /* Responsive */
        @media (max-width: 380px) {
            .container { padding: 36px 16px 36px; }
            .brand-en { font-size: 22px; letter-spacing: 4px; }
            .link-card { padding: 12px 14px; gap: 12px; }
            .link-icon { width: 38px; height: 38px; }
        }

        @media (min-width: 768px) {
            .container { padding-top: 80px; }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(200, 150, 62, 0.2); border-radius: 3px; }

        /* Selection color */
        ::selection { background: rgba(200, 150, 62, 0.3); color: white; }
    </style>
</head>

    <script>
        // Generate floating particles
        const particlesEl = document.getElementById('particles');
        const particleCount = 35;

        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
            p.style.setProperty('--delay', (Math.random() * 5) + 's');

            // Random sizes
            const size = 1 + Math.random() * 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';

            // Some particles are gold
            if (Math.random() > 0.7) {
                p.style.background = 'rgba(200, 150, 62, 0.6)';
            }

            particlesEl.appendChild(p);
        }

        // Subtle parallax on mouse move (desktop only)
        if (window.matchMedia('(hover: hover)').matches) {
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 8;
                const y = (e.clientY / window.innerHeight - 0.5) * 8;
                document.querySelector('.orb-1').style.transform = `translate(${x}px, ${y}px)`;
                document.querySelector('.orb-2').style.transform = `translate(${-x}px, ${-y}px)`;
            });
        }
    </script>
</body>
</html>

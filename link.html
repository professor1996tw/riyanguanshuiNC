<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日央水原 SUNWATER — 遊戲交易服務商</title>
    <meta name="description" content="日央水原商行 — 專業遊戲虛寶交易服務商，安全交易、即時到帳">
    <meta property="og:title" content="日央水原 SUNWATER">
    <meta property="og:description" content="專業遊戲虛寶交易服務商 — 安全交易・即時到帳">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050510;
            --navy: #0a1628;
            --gold: #C8963E;
            --gold-light: #e8be6a;
            --gold-bright: #f5d78e;
            --gold-glow: rgba(200, 150, 62, 0.5);
            --cyan: #38bdf8;
            --cyan-glow: rgba(56, 189, 248, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.55);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans TC', 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================
           BACKGROUND — Animated Liquid Glow Orbs
           ============================================ */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(ellipse 120% 80% at 50% 20%, #0a1628 0%, var(--bg-deep) 70%);
        }

        /* Liquid glow orbs */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .glow-orb--gold {
            width: 350px; height: 350px;
            top: -10%; left: -5%;
            background: radial-gradient(circle, rgba(200, 150, 62, 0.35) 0%, rgba(200, 150, 62, 0.08) 50%, transparent 70%);
            animation-delay: 0s;
            animation-duration: 14s;
        }

        .glow-orb--cyan {
            width: 280px; height: 280px;
            top: 30%; right: -15%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, rgba(56, 189, 248, 0.05) 50%, transparent 70%);
            animation-delay: 3s;
            animation-duration: 16s;
        }

        .glow-orb--blue {
            width: 300px; height: 300px;
            bottom: 5%; left: -10%;
            background: radial-gradient(circle, rgba(27, 58, 150, 0.3) 0%, rgba(27, 58, 150, 0.08) 50%, transparent 70%);
            animation-delay: 6s;
            animation-duration: 18s;
        }

        .glow-orb--gold2 {
            width: 200px; height: 200px;
            top: 60%; right: -5%;
            background: radial-gradient(circle, rgba(200, 150, 62, 0.2) 0%, transparent 70%);
            animation-delay: 9s;
            animation-duration: 20s;
        }

        @keyframes orbFloat {
            0%, 100% {
                opacity: 0.5;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            25% {
                opacity: 0.8;
                transform: translate(30px, -20px) scale(1.15) rotate(5deg);
            }
            50% {
                opacity: 0.6;
                transform: translate(-20px, 20px) scale(1.05) rotate(-3deg);
            }
            75% {
                opacity: 0.9;
                transform: translate(15px, 10px) scale(1.2) rotate(2deg);
            }
        }

        /* Mesh gradient overlay */
        .mesh-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.04;
            background-image:
                radial-gradient(at 40% 20%, rgba(200, 150, 62, 0.5) 0px, transparent 50%),
                radial-gradient(at 80% 0%, rgba(56, 189, 248, 0.3) 0px, transparent 50%),
                radial-gradient(at 0% 50%, rgba(27, 58, 150, 0.4) 0px, transparent 50%);
        }

        /* ============================================
           NEON PORTAL FRAMES
           ============================================ */
        .neon-portals {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            perspective: 800px;
            perspective-origin: 50% 55%;
            overflow: hidden;
        }

        .portal {
            position: absolute;
            border: 1.5px solid rgba(140, 210, 255, 0.25);
            border-radius: 4px;
            box-shadow:
                0 0 12px rgba(140, 210, 255, 0.08),
                0 0 30px rgba(140, 210, 255, 0.04),
                inset 0 0 12px rgba(140, 210, 255, 0.03);
            animation: portalPulse var(--pulse-dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        /* Left side portals - angled inward */
        .portal--l1 {
            width: 55px; height: 110px;
            left: 4%; top: 25%;
            transform: rotateY(30deg) rotateZ(-2deg);
            --pulse-dur: 5s; --delay: 0s;
        }
        .portal--l2 {
            width: 40px; height: 85px;
            left: 10%; top: 32%;
            transform: rotateY(25deg) rotateZ(-1deg);
            opacity: 0.6;
            --pulse-dur: 6s; --delay: 1.5s;
        }
        .portal--l3 {
            width: 28px; height: 60px;
            left: 16%; top: 38%;
            transform: rotateY(20deg);
            opacity: 0.35;
            --pulse-dur: 7s; --delay: 3s;
        }
        .portal--l4 {
            width: 18px; height: 40px;
            left: 21%; top: 42%;
            transform: rotateY(15deg);
            opacity: 0.2;
            --pulse-dur: 8s; --delay: 4s;
        }

        /* Right side portals - angled inward */
        .portal--r1 {
            width: 55px; height: 110px;
            right: 4%; top: 25%;
            transform: rotateY(-30deg) rotateZ(2deg);
            --pulse-dur: 5.5s; --delay: 0.8s;
        }
        .portal--r2 {
            width: 40px; height: 85px;
            right: 10%; top: 32%;
            transform: rotateY(-25deg) rotateZ(1deg);
            opacity: 0.6;
            --pulse-dur: 6.5s; --delay: 2s;
        }
        .portal--r3 {
            width: 28px; height: 60px;
            right: 16%; top: 38%;
            transform: rotateY(-20deg);
            opacity: 0.35;
            --pulse-dur: 7.5s; --delay: 3.5s;
        }
        .portal--r4 {
            width: 18px; height: 40px;
            right: 21%; top: 42%;
            transform: rotateY(-15deg);
            opacity: 0.2;
            --pulse-dur: 8.5s; --delay: 4.5s;
        }

        /* Center vanishing point portals */
        .portal--c1 {
            width: 12px; height: 26px;
            left: 50%; top: 45%;
            transform: translateX(-50%);
            opacity: 0.12;
            --pulse-dur: 9s; --delay: 5s;
        }

        @keyframes portalPulse {
            0%, 100% {
                border-color: rgba(140, 210, 255, 0.2);
                box-shadow:
                    0 0 12px rgba(140, 210, 255, 0.06),
                    0 0 30px rgba(140, 210, 255, 0.03),
                    inset 0 0 12px rgba(140, 210, 255, 0.02);
            }
            50% {
                border-color: rgba(140, 210, 255, 0.4);
                box-shadow:
                    0 0 20px rgba(140, 210, 255, 0.12),
                    0 0 50px rgba(140, 210, 255, 0.06),
                    inset 0 0 20px rgba(140, 210, 255, 0.05);
            }
        }

        /* Fog / depth mist effect at center */
        .portal-fog {
            position: fixed;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(140, 210, 255, 0.04) 0%, transparent 70%);
            filter: blur(30px);
            z-index: 0;
            pointer-events: none;
            animation: fogPulse 8s ease-in-out infinite;
        }

        @keyframes fogPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* Network canvas (particle mesh) */
        .network-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* City skyline canvas */
        .city-canvas {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Noise grain texture */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 128px 128px;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleRise var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes particleRise {
            0% { opacity: 0; transform: translateY(20px) scale(0.5); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-60px) scale(0.3); }
        }

        /* ============================================
           CONTAINER
           ============================================ */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 50px 22px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ============================================
           BRAND HERO
           ============================================ */
        .brand-hero {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
        }

        /* Spinning glow ring behind logo */
        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 160px;
            height: 160px;
            transform: translate(-50%, -70%);
            border-radius: 50%;
            pointer-events: none;
            animation: ringRotate 8s linear infinite;
        }

        .logo-ring::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(200, 150, 62, 0.5) 15%,
                transparent 30%,
                rgba(56, 189, 248, 0.3) 50%,
                transparent 65%,
                rgba(200, 150, 62, 0.4) 80%,
                transparent 100%
            );
            filter: blur(8px);
        }

        @keyframes ringRotate {
            from { transform: translate(-50%, -70%) rotate(0deg); }
            to { transform: translate(-50%, -70%) rotate(360deg); }
        }

        /* Pulse glow behind logo */
        .logo-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -70%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 150, 62, 0.2) 0%, transparent 60%);
            animation: pulseGlow 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -70%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -70%) scale(1.25); }
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            position: relative;
            z-index: 2;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.12), rgba(10, 22, 40, 0.8));
            border: 1.5px solid rgba(200, 150, 62, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 50px rgba(200, 150, 62, 0.15),
                0 0 100px rgba(200, 150, 62, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                inset 0 -1px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logoEntry 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        @keyframes logoEntry {
            from { opacity: 0; transform: scale(0.5) translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        .logo-container svg { width: 85%; height: 85%; }

        .brand-text {
            animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }

        @keyframes textEntry {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .brand-en {
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 8px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #f5d78e 0%, #C8963E 40%, #e8be6a 60%, #f5d78e 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both, shimmerText 4s linear infinite;
        }

        @keyframes shimmerText {
            from { background-position: 0% center; }
            to { background-position: 200% center; }
        }

        .brand-cn {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 12px;
            margin-bottom: 16px;
            animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.65s both;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--gold-light);
            letter-spacing: 3px;
            padding: 6px 20px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.1), rgba(56, 189, 248, 0.05));
            border: 1px solid rgba(200, 150, 62, 0.2);
            backdrop-filter: blur(10px);
            animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
        }

        .badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold-glow), 0 0 20px rgba(200, 150, 62, 0.2);
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.5; box-shadow: 0 0 8px var(--gold-glow); }
            50% { opacity: 1; box-shadow: 0 0 12px var(--gold-glow), 0 0 25px rgba(200, 150, 62, 0.3); }
        }

        /* Decorative divider */
        .divider {
            width: 80px;
            height: 1px;
            margin: 0 auto 32px;
            position: relative;
            animation: textEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
        }

        .divider::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-glow), rgba(56, 189, 248, 0.3), transparent);
        }

        .divider::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        /* ============================================
           LINK CARDS — Glass Morphism
           ============================================ */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 15px 18px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(40px) saturate(1.4);
            -webkit-backdrop-filter: blur(40px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 2px 12px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            color: var(--text-primary);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Card stagger entrance */
        .link-card:nth-child(1) { animation: cardEntry 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.0s both; }
        .link-card:nth-child(2) { animation: cardEntry 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.1s both; }
        .link-card:nth-child(3) { animation: cardEntry 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.2s both; }
        .link-card:nth-child(4) { animation: cardEntry 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.3s both; }
        .link-card:nth-child(5) { animation: cardEntry 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.4s both; }
        .link-card:nth-child(6) { animation: cardEntry 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.5s both; }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateX(-40px) scale(0.95); filter: blur(5px); }
            to { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
        }

        /* Glow border on hover */
        .link-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 17px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.5), rgba(56, 189, 248, 0.3), rgba(200, 150, 62, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Light sweep effect */
        .link-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(200, 150, 62, 0.08), rgba(255, 255, 255, 0.06), transparent);
            transform: skewX(-15deg);
            transition: none;
        }

        .link-card:hover {
            transform: translateY(-4px) scale(1.02);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.13), rgba(200, 150, 62, 0.06));
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow:
                0 10px 40px rgba(200, 150, 62, 0.12),
                0 4px 15px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .link-card:hover::before { opacity: 1; }
        .link-card:hover::after {
            left: 130%;
            transition: left 0.8s ease;
        }

        .link-card:active {
            transform: translateY(-2px) scale(1.01);
        }

        .link-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .link-card:hover .link-icon {
            transform: scale(1.1) rotate(-3deg);
        }

        .link-icon svg { width: 22px; height: 22px; }

        .link-content { flex: 1; position: relative; z-index: 1; }
        .link-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }
        .link-card:hover .link-title { color: var(--gold-light); }

        .link-desc {
            font-size: 10.5px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .link-arrow {
            color: rgba(255,255,255,0.15);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
        }
        .link-card:hover .link-arrow {
            color: var(--gold);
            transform: translateX(5px);
            filter: drop-shadow(0 0 6px var(--gold-glow));
        }

        /* Icon background styles */
        .icon-trade {
            background: linear-gradient(135deg, rgba(200, 150, 62, 0.2), rgba(200, 150, 62, 0.05));
            box-shadow: 0 0 20px rgba(200, 150, 62, 0.08), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .icon-web {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(56, 189, 248, 0.05));
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.08), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .icon-line {
            background: linear-gradient(135deg, rgba(6, 199, 85, 0.2), rgba(6, 199, 85, 0.05));
            box-shadow: 0 0 20px rgba(6, 199, 85, 0.08), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .icon-meta {
            background: linear-gradient(135deg, rgba(24, 119, 242, 0.2), rgba(24, 119, 242, 0.05));
            box-shadow: 0 0 20px rgba(24, 119, 242, 0.08), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .icon-ig {
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.2), rgba(131, 58, 180, 0.1));
            box-shadow: 0 0 20px rgba(225, 48, 108, 0.08), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .icon-kyc {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05));
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.08), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* Hover glow per icon */
        .link-card:hover .icon-trade { box-shadow: 0 0 25px rgba(200, 150, 62, 0.25); }
        .link-card:hover .icon-web { box-shadow: 0 0 25px rgba(56, 189, 248, 0.25); }

    <script>
        // === WIREFRAME CITY SKYLINE ===
        (function() {
            const cityCanvas = document.getElementById('cityCanvas');
            const cctx = cityCanvas.getContext('2d');
            let buildings = [];
            let beams = [];
            let dataDrops = [];
            let cityW, cityH;
            let time = 0;

            function resizeCity() {
                cityW = cityCanvas.width = window.innerWidth;
                cityH = cityCanvas.height = window.innerHeight;
                generateCity();
            }

            function generateCity() {
                buildings = [];
                beams = [];
                dataDrops = [];

                const baseY = cityH * 0.82;
                const minH = 40;
                const maxH = cityH * 0.38;
                let x = -10;

                while (x < cityW + 10) {
                    const w = 12 + Math.random() * 40;
                    const h = minH + Math.random() * (maxH - minH);
                    // Taller buildings near center
                    const centerBias = 1 - Math.abs((x / cityW) - 0.5) * 1.2;
                    const finalH = h * Math.max(0.3, centerBias);

                    const bld = {
                        x: x,
                        y: baseY - finalH,
                        w: w,
                        h: finalH,
                        // Window grid
                        windowCols: Math.max(1, Math.floor(w / 8)),
                        windowRows: Math.max(2, Math.floor(finalH / 12)),
                        // Random features
                        hasAntenna: Math.random() > 0.7 && finalH > 100,
                        antennaH: 10 + Math.random() * 25,
                        hasSpire: Math.random() > 0.85 && finalH > 120,
                        spireH: 15 + Math.random() * 30,
                        // Glow
                        glowIntensity: 0.3 + Math.random() * 0.7,
                        glowPhase: Math.random() * Math.PI * 2,
                        // Color mix
                        isCyan: Math.random() > 0.4,
                    };
                    buildings.push(bld);

                    // Vertical light beams from some tall buildings
                    if (finalH > maxH * 0.5 && Math.random() > 0.55) {
                        beams.push({
                            x: x + w / 2,
                            baseY: baseY - finalH,
                            height: 30 + Math.random() * 80,
                            width: 1 + Math.random() * 2,
                            speed: 0.5 + Math.random() * 1.5,
                            phase: Math.random() * Math.PI * 2,
                            isCyan: bld.isCyan
                        });
                    }

                    // Data rain drops
                    if (Math.random() > 0.6) {
                        for (let d = 0; d < 2 + Math.random() * 3; d++) {
                            dataDrops.push({
                                x: x + Math.random() * w,
                                y: baseY - finalH - Math.random() * 60,
                                speed: 0.3 + Math.random() * 1,
                                length: 5 + Math.random() * 15,
                                maxY: baseY,
                                startY: baseY - finalH - Math.random() * 60,
                                isCyan: Math.random() > 0.4,
                                alpha: 0.1 + Math.random() * 0.3
                            });
                        }
                    }

                    x += w + 2 + Math.random() * 6;
                }
            }

            function drawCity() {
                cctx.clearRect(0, 0, cityW, cityH);
                time += 0.01;

                const baseY = cityH * 0.82;

                // Ground reflection / fog
                const fogGrad = cctx.createLinearGradient(0, baseY - 20, 0, cityH);
                fogGrad.addColorStop(0, 'transparent');
                fogGrad.addColorStop(0.3, 'rgba(56, 189, 248, 0.02)');
                fogGrad.addColorStop(1, 'rgba(5, 5, 16, 0.8)');
                cctx.fillStyle = fogGrad;
                cctx.fillRect(0, baseY - 20, cityW, cityH - baseY + 20);

                // Ground line
                cctx.strokeStyle = 'rgba(56, 189, 248, 0.15)';
                cctx.lineWidth = 1;
                cctx.beginPath();
                cctx.moveTo(0, baseY);
                cctx.lineTo(cityW, baseY);
                cctx.stroke();

                // Glow along ground
                const groundGlow = cctx.createLinearGradient(0, baseY - 8, 0, baseY + 8);
                groundGlow.addColorStop(0, 'transparent');
                groundGlow.addColorStop(0.5, 'rgba(56, 189, 248, 0.06)');
                groundGlow.addColorStop(1, 'transparent');
                cctx.fillStyle = groundGlow;
                cctx.fillRect(0, baseY - 8, cityW, 16);

                // Draw data rain
                dataDrops.forEach(d => {
                    d.y += d.speed;
                    if (d.y > d.maxY) d.y = d.startY;
                    const col = d.isCyan ? `rgba(56, 189, 248, ${d.alpha})` : `rgba(200, 150, 62, ${d.alpha})`;
                    cctx.strokeStyle = col;
                    cctx.lineWidth = 0.5;
                    cctx.beginPath();
                    cctx.moveTo(d.x, d.y);
                    cctx.lineTo(d.x, d.y + d.length);
                    cctx.stroke();
                });

                // Draw buildings
                buildings.forEach(b => {
                    const pulse = Math.sin(time * 2 + b.glowPhase) * 0.3 + 0.7;
                    const alpha = 0.12 * b.glowIntensity * pulse;
                    const lineColor = b.isCyan
                        ? `rgba(56, 189, 248, ${alpha + 0.08})`
                        : `rgba(200, 150, 62, ${alpha + 0.06})`;
                    const fillColor = b.isCyan
                        ? `rgba(56, 189, 248, ${alpha * 0.15})`
                        : `rgba(200, 150, 62, ${alpha * 0.12})`;

                    // Building fill (very subtle)
                    cctx.fillStyle = fillColor;
                    cctx.fillRect(b.x, b.y, b.w, b.h);

                    // Building wireframe outline
                    cctx.strokeStyle = lineColor;
                    cctx.lineWidth = 0.8;
                    cctx.strokeRect(b.x, b.y, b.w, b.h);

                    // Horizontal floor lines
                    const floorH = b.h / b.windowRows;
                    cctx.lineWidth = 0.3;
                    cctx.strokeStyle = b.isCyan
                        ? `rgba(56, 189, 248, ${alpha * 0.5})`
                        : `rgba(200, 150, 62, ${alpha * 0.4})`;
                    for (let r = 1; r < b.windowRows; r++) {
                        const fy = b.y + r * floorH;
                        cctx.beginPath();
                        cctx.moveTo(b.x, fy);
                        cctx.lineTo(b.x + b.w, fy);
                        cctx.stroke();
                    }

                    // Vertical column lines
                    const colW = b.w / b.windowCols;
                    for (let c = 1; c < b.windowCols; c++) {
                        const cx = b.x + c * colW;
                        cctx.beginPath();
                        cctx.moveTo(cx, b.y);
                        cctx.lineTo(cx, b.y + b.h);
                        cctx.stroke();
                    }

                    // Random lit windows
                    cctx.lineWidth = 0.5;
                    for (let r = 0; r < b.windowRows; r++) {
                        for (let c = 0; c < b.windowCols; c++) {
                            if (Math.sin(time * 0.5 + r * 3.7 + c * 2.3 + b.glowPhase) > 0.6) {
                                const wx = b.x + c * colW + 1.5;
                                const wy = b.y + r * floorH + 1.5;
                                const ww = colW - 3;
                                const wh = floorH - 3;
                                if (ww > 1 && wh > 1) {
                                    const winAlpha = (Math.sin(time + r + c + b.glowPhase) * 0.3 + 0.5) * b.glowIntensity;
                                    cctx.fillStyle = b.isCyan
                                        ? `rgba(56, 189, 248, ${winAlpha * 0.15})`
                                        : `rgba(200, 150, 62, ${winAlpha * 0.12})`;
                                    cctx.fillRect(wx, wy, ww, wh);
                                }
                            }
                        }
                    }

                    // Antenna
                    if (b.hasAntenna) {
                        const ax = b.x + b.w / 2;
                        cctx.strokeStyle = lineColor;
                        cctx.lineWidth = 0.8;
                        cctx.beginPath();
                        cctx.moveTo(ax, b.y);
                        cctx.lineTo(ax, b.y - b.antennaH);
                        cctx.stroke();
                        // Antenna tip blink
                        const blinkAlpha = Math.sin(time * 3 + b.glowPhase) > 0.5 ? 0.8 : 0.2;
                        cctx.fillStyle = b.isCyan
                            ? `rgba(56, 189, 248, ${blinkAlpha})`
                            : `rgba(200, 150, 62, ${blinkAlpha})`;
                        cctx.beginPath();
                        cctx.arc(ax, b.y - b.antennaH, 1.5, 0, Math.PI * 2);
                        cctx.fill();
                    }

                    // Spire
                    if (b.hasSpire) {
                        const sx = b.x + b.w / 2;
                        cctx.strokeStyle = lineColor;
                        cctx.lineWidth = 0.6;
                        cctx.beginPath();
                        cctx.moveTo(b.x + b.w * 0.3, b.y);
                        cctx.lineTo(sx, b.y - b.spireH);
                        cctx.lineTo(b.x + b.w * 0.7, b.y);
                        cctx.stroke();
                    }
                });

                // Draw vertical light beams
                beams.forEach(beam => {
                    const pulseAlpha = (Math.sin(time * beam.speed + beam.phase) * 0.5 + 0.5) * 0.25;
                    const grad = cctx.createLinearGradient(beam.x, beam.baseY - beam.height, beam.x, beam.baseY);
                    const col = beam.isCyan ? '56, 189, 248' : '200, 150, 62';
                    grad.addColorStop(0, `rgba(${col}, 0)`);
                    grad.addColorStop(0.5, `rgba(${col}, ${pulseAlpha})`);
                    grad.addColorStop(1, `rgba(${col}, ${pulseAlpha * 0.3})`);
                    cctx.strokeStyle = grad;
                    cctx.lineWidth = beam.width;
                    cctx.beginPath();
                    cctx.moveTo(beam.x, beam.baseY);
                    cctx.lineTo(beam.x, beam.baseY - beam.height);
                    cctx.stroke();
                });

                // Reflection (mirrored, faded)
                cctx.save();
                cctx.globalAlpha = 0.04;
                cctx.translate(0, baseY * 2);
                cctx.scale(1, -1);
                buildings.forEach(b => {
                    const col = b.isCyan ? 'rgba(56, 189, 248, 0.3)' : 'rgba(200, 150, 62, 0.2)';
                    cctx.strokeStyle = col;
                    cctx.lineWidth = 0.5;
                    cctx.strokeRect(b.x, b.y, b.w, b.h * 0.5);
                });
                cctx.restore();

                requestAnimationFrame(drawCity);
            }

            resizeCity();
            window.addEventListener('resize', resizeCity);
            drawCity();
        })();

        // === Floating particles ===
        const particlesEl = document.getElementById('particles');
        const count = 45;

        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
            p.style.setProperty('--delay', (Math.random() * 8) + 's');

            const size = 1.5 + Math.random() * 3;
            p.style.width = size + 'px';
            p.style.height = size + 'px';

            // Mix of gold and cyan particles
            const rand = Math.random();
            if (rand > 0.7) {
                p.style.background = 'rgba(200, 150, 62, 0.7)';
                p.style.boxShadow = '0 0 6px rgba(200, 150, 62, 0.4)';
            } else if (rand > 0.5) {
                p.style.background = 'rgba(56, 189, 248, 0.5)';
                p.style.boxShadow = '0 0 6px rgba(56, 189, 248, 0.3)';
            } else {
                p.style.background = 'rgba(255, 255, 255, 0.5)';
            }

            particlesEl.appendChild(p);
        }

        // === Interactive orb parallax (desktop) ===
        if (window.matchMedia('(hover: hover)').matches) {
            const orbs = document.querySelectorAll('.glow-orb');
            document.addEventListener('mousemove', (e) => {
                const mx = (e.clientX / window.innerWidth - 0.5);
                const my = (e.clientY / window.innerHeight - 0.5);
                orbs.forEach((orb, i) => {
                    const speed = 15 + i * 8;
                    orb.style.transform = `translate(${mx * speed}px, ${my * speed}px)`;
                });
            });
        }

        // === Card touch ripple effect ===
        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('click', function(e) {
                const ripple = document.createElement('div');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;

                ripple.style.cssText = `
                    position: absolute; width: ${size}px; height: ${size}px;
                    left: ${x}px; top: ${y}px;
                    border-radius: 50%;
                    background: radial-gradient(circle, rgba(200,150,62,0.15) 0%, transparent 70%);
                    transform: scale(0); opacity: 1;
                    animation: rippleOut 0.6s ease-out forwards;
                    pointer-events: none; z-index: 0;
                `;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // === Network Canvas (Polygon Mesh) ===
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = [];
        const NODE_COUNT = 60;
        const CONNECTION_DIST = 130;
        let mouseX = -1000, mouseY = -1000;
        let animId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Create nodes
        for (let i = 0; i < NODE_COUNT; i++) {
            nodes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                radius: 1 + Math.random() * 1.5,
                isGold: Math.random() > 0.65
            });
        }

        // Track mouse for interactive glow
        if (window.matchMedia('(hover: hover)').matches) {
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });
        }

        function drawNetwork() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update & draw nodes
            nodes.forEach(node => {
                node.x += node.vx;
                node.y += node.vy;

                // Bounce off edges
                if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
                if (node.y < 0 || node.y > canvas.height) node.vy *= -1;

                // Mouse repulsion
                const dx = node.x - mouseX;
                const dy = node.y - mouseY;
                const mouseDist = Math.sqrt(dx * dx + dy * dy);
                if (mouseDist < 150) {
                    node.vx += dx * 0.0005;
                    node.vy += dy * 0.0005;
                }

                // Speed limit
                const speed = Math.sqrt(node.vx * node.vx + node.vy * node.vy);
                if (speed > 0.8) {
                    node.vx *= 0.8 / speed;
                    node.vy *= 0.8 / speed;
                }
            });

            // Draw connections
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONNECTION_DIST) {
                        const alpha = (1 - dist / CONNECTION_DIST) * 0.15;
                        const isGoldLine = nodes[i].isGold || nodes[j].isGold;
                        ctx.strokeStyle = isGoldLine
                            ? `rgba(200, 150, 62, ${alpha})`
                            : `rgba(56, 189, 248, ${alpha * 0.6})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }

            // Draw nodes
            nodes.forEach(node => {
                const glow = node.isGold
                    ? 'rgba(200, 150, 62, 0.8)'
                    : 'rgba(56, 189, 248, 0.5)';
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fill();

                // Mouse proximity glow boost
                const md = Math.sqrt((node.x - mouseX) ** 2 + (node.y - mouseY) ** 2);
                if (md < 180) {
                    const glowAlpha = (1 - md / 180) * 0.4;
                    ctx.fillStyle = node.isGold
                        ? `rgba(200, 150, 62, ${glowAlpha})`
                        : `rgba(56, 189, 248, ${glowAlpha})`;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, node.radius + 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            animId = requestAnimationFrame(drawNetwork);
        }
        drawNetwork();

        // Pause when tab not visible
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                cancelAnimationFrame(animId);
            } else {
                drawNetwork();
            }
        });

        // Add ripple keyframes dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleOut {
                to { transform: scale(2.5); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

    </script>

    <!-- Coming Soon Modal -->
    <div class="modal-overlay" id="comingSoonModal">
        <div class="modal-box">
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#C8963E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </div>
            <div class="modal-title">準備上線中</div>
            <div class="modal-desc">交易網正在緊鑼密鼓地建設中<br>敬請期待！</div>
            <button class="modal-btn" onclick="document.getElementById('comingSoonModal').classList.remove('show')">我知道了</button>
        </div>
    </div>

    <script>
        document.getElementById('comingSoonModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });
    </script>
</body>

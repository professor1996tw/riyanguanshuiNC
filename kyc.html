<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-X6099N611V"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNWATER KYC 系統</title>
    <!-- 引入核心套件 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        html, body, #root { 
            height: 100%; 
            width: 100%; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            background-color: #0d1117;
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        /* 動畫效果 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, memo } = React;

        // --- 設定區：您的 Google Apps Script 網址 ---
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxMOwBCqpEhFcivpnz4e4QLqN9hEnWJLIMbfU4V4zdvH6dJPLKC11N5ysAnEFKrAgqwow/exec";

        // --- SVG 圖示組件庫 ---
        const Icons = {
            Check: ({ className }) => (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            ),
            Alert: ({ className }) => (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            ),
            Camera: ({ className }) => (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            ),
            Shield: ({ className }) => (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            ),
            Loader: () => (
                <svg className="animate-spin h-5 w-5 mr-3 text-current" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            )
        };

        // --- 子組件：動態通知彈窗 ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const isError = type === 'error';
            return (
                <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl ${isError ? 'bg-red-500' : 'bg-orange-500'} text-white font-bold animate-slide-up`}>
                    {isError ? <Icons.Alert className="w-5 h-5" /> : <Icons.Check className="w-5 h-5" />}
                    <span className="text-sm tracking-wide">{message}</span>
                </div>
            );
        };

        // --- 子組件：輸入框 ---
        const InputField = memo(({ label, type = "text", placeholder, value, onChange, maxLength, error }) => (
            <div className="flex-1 min-w-[240px] mb-4 text-left">
                <label className="block text-[11px] font-bold text-slate-500 mb-2 ml-1 uppercase tracking-wider">{label}</label>
                <input
                    type={type}
                    maxLength={maxLength}
                    className={`w-full bg-[#1c2128] border ${error ? 'border-red-500/50' : 'border-slate-800'} rounded-xl px-4 py-4 focus:border-orange-500/50 focus:ring-4 focus:ring-orange-500/10 outline-none transition-all placeholder:text-slate-700 text-white text-base shadow-inner`}
                    placeholder={placeholder}
                    value={value}
                    onChange={(e) => onChange(e.target.value)}
                />
            </div>
        ));

        function App() {
            const [currentStep, setCurrentStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [toast, setToast] = useState(null);
            
            const [formData, setFormData] = useState({
                name: '', gender: '男', birthDate: '', birthPlace: '', idNumber: '', idExpiry: '', email: '', phone: '',
                bankName: '', bankAccount: '', idFront: '', idBack: '', bankPassbook: ''
            });

            const [checks, setChecks] = useState({ nameMatch: false, qualityOk: false });

            const showToast = (msg, type = 'error') => {
                setToast({ msg, type });
            };

            const handleInputChange = (field, value) => {
                // 針對日期與特定欄位進行數字過濾
                if (field === 'birthDate' || field === 'idExpiry' || field === 'phone' || field === 'bankAccount') {
                    const filteredValue = value.replace(/[^\d]/g, '');
                    setFormData(prev => ({ ...prev, [field]: filteredValue }));
                } else {
                    setFormData(prev => ({ ...prev, [field]: value }));
                }
            };

            const processImage = (file, fieldName) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        // 壓縮解析度至 800px 以利傳輸
                        const scale = Math.min(800 / img.width, 1);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const watermark = "供日央水原交易審核用";
                        ctx.font = `bold ${canvas.width / 15}px "Noto Sans TC"`;
                        ctx.fillStyle = "rgba(251, 146, 60, 0.3)";
                        ctx.textAlign = "center";
                        
                        // 繪製多個浮水印
                        for(let x = canvas.width/4; x <= canvas.width; x += canvas.width/2) {
                            for(let y = canvas.height/4; y <= canvas.height; y += canvas.height/2) {
                                ctx.save();
                                ctx.translate(x, y);
                                ctx.rotate(-Math.PI / 6);
                                ctx.fillText(watermark, 0, 0);
                                ctx.restore();
                            }
                        }
                        // 轉換為 JPEG 品質 0.6 以節省空間
                        handleInputChange(fieldName, canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleFileChange = (e, key) => {
                const file = e.target.files[0];
                if (file) {
                    processImage(file, key);
                }
            };

            const validateStep1 = () => {
                const idRegex = /^[A-Z][12]\d{8}$/;
                if (!formData.name || formData.name.length < 2) { showToast("請填寫正確真實姓名"); return false; }
                if (!idRegex.test(formData.idNumber)) { showToast("身分證字號格式錯誤 (首字母大寫)"); return false; }
                if (formData.birthDate.length !== 7) { showToast("出生日期請填寫 7 位數字"); return false; }
                if (formData.idExpiry.length !== 7) { showToast("發證日期請填寫 7 位數字"); return false; }
                if (!formData.phone || !formData.email) { showToast("請填寫聯繫資訊"); return false; }
                return true;
            };

            const handleSubmit = async () => {
                if (!formData.bankName || !formData.bankAccount || !formData.idFront || !formData.idBack || !formData.bankPassbook) {
                    showToast("請上傳所有必要的證件影像與銀行資訊"); return;
                }
                if (!checks.nameMatch || !checks.qualityOk) {
                    showToast("請勾選並確認宣告事項"); return;
                }

                setLoading(true);

                try {
                    // 執行實際傳送到 Google Apps Script
                    await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors', // 關鍵：解決 Google Apps Script 跨域限制
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            ...formData,
                            action: 'kyc_upload',
                            timestamp: new Date().toISOString()
                        })
                    });

                    // 由於 no-cors 無法接收 Response，我們假設發送出去即成功
                    setTimeout(() => {
                        setSubmitted(true);
                        setLoading(false);
                    }, 2000);

                } catch (err) {
                    console.error("傳輸失敗:", err);
                    showToast("連線至雲端失敗，請檢查網路狀態");
                    setLoading(false);
                }
            };

            if (submitted) {
                return (
                    <div className="h-full flex items-center justify-center p-6 text-white text-center">
                        <div className="max-w-md w-full bg-[#161b22] border border-orange-500/30 rounded-[2.5rem] p-12 shadow-2xl animate-slide-up">
                            <div className="w-24 h-24 bg-orange-500 text-black rounded-full flex items-center justify-center mx-auto mb-8 shadow-[0_0_40px_rgba(249,115,22,0.4)]">
                                <Icons.Check className="w-12 h-12" />
                            </div>
                            <h2 className="text-3xl font-black mb-4 italic uppercase tracking-tighter">Verified Success</h2>
                            <p className="text-slate-400 mb-10 text-base leading-relaxed">您的認證資料已成功送出。<br/>系統已將資料加密傳送至雲端存儲。</p>
                            {/* 修改處：點擊按鈕跳轉至同目錄下的 index.html */}
                            <button 
                                onClick={() => window.location.href = 'index.html'} 
                                className="w-full py-5 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-bold transition-all uppercase tracking-widest text-sm"
                            >
                                回到首頁
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-full flex flex-col">
                    {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
                    
                    <header className="py-6 px-6 text-center border-b border-slate-800/50 bg-[#161b22]/90 backdrop-blur-md sticky top-0 z-50">
                        <h1 className="text-xl font-black italic uppercase text-white flex items-center justify-center gap-3 tracking-tighter">
                            <div className="w-1.5 h-6 bg-orange-500 rounded-full"></div>
                            SUNWATER <span className="text-orange-500">KYC</span>
                        </h1>
                    </header>

                    <main className="flex-grow max-w-2xl mx-auto w-full mt-8 px-4 pb-12">
                        {/* 進度條 */}
                        <div className="mb-8 px-2">
                            <div className="flex justify-between text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">
                                <span className={currentStep === 1 ? 'text-white' : ''}>STEP 01. BASIC</span>
                                <span className={currentStep === 2 ? 'text-white' : ''}>STEP 02. VERIFY</span>
                            </div>
                            <div className="bg-[#161b22] rounded-full h-1.5 w-full p-0.5 border border-slate-800">
                                <div className={`h-full rounded-full transition-all duration-700 ${currentStep === 1 ? 'w-1/2 bg-slate-600' : 'w-full bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.5)]'}`}></div>
                            </div>
                        </div>

                        <div className="bg-[#161b22] border border-slate-800/50 rounded-[2.5rem] overflow-hidden shadow-2xl">
                            <div className="p-8 md:p-12">
                                {currentStep === 1 ? (
                                    <div className="space-y-8 animate-slide-up">
                                        <h2 className="text-2xl font-black italic uppercase tracking-tight text-white text-left">基本資料填寫</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                                            <InputField label="姓名" placeholder="需與證件一致" value={formData.name} onChange={val => handleInputChange('name', val)} />
                                            <div className="flex-1 mb-4 text-left">
                                                <label className="block text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-wider">性別</label>
                                                <div className="flex gap-2 p-1.5 bg-[#0d1117] border border-slate-800 rounded-xl h-[58px]">
                                                    {['男', '女'].map(g => (
                                                        <button key={g} type="button" onClick={() => handleInputChange('gender', g)} className={`flex-1 rounded-lg font-bold text-sm transition-all ${formData.gender === g ? 'bg-white text-black shadow-lg' : 'text-slate-500'}`}>{g}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <InputField label="出生年月日 (7碼)" placeholder="0791010" maxLength={7} value={formData.birthDate} onChange={val => handleInputChange('birthDate', val)} />
                                            <InputField label="出生地" placeholder="縣市名稱" value={formData.birthPlace} onChange={val => handleInputChange('birthPlace', val)} />
                                            <InputField label="身分證號" placeholder="首字母需大寫" value={formData.idNumber} onChange={val => handleInputChange('idNumber', val)} />
                                            <InputField label="發證日期 (7碼)" placeholder="1130225" maxLength={7} value={formData.idExpiry} onChange={val => handleInputChange('idExpiry', val)} />
                                            <InputField label="電子郵件" type="email" placeholder="example@mail.com" value={formData.email} onChange={val => handleInputChange('email', val)} />
                                            <InputField label="手機號碼" placeholder="09xx-xxx-xxx" value={formData.phone} onChange={val => handleInputChange('phone', val)} />
                                        </div>
                                        <button type="button" onClick={() => validateStep1() && setCurrentStep(2)} className="w-full py-5 bg-white text-black rounded-2xl font-black uppercase tracking-widest hover:bg-orange-500 transition-all text-sm shadow-xl active:scale-[0.98]">下一步 NEXT →</button>
                                    </div>
                                ) : (
                                    <div className="space-y-8 animate-slide-up">
                                        <h2 className="text-2xl font-black italic uppercase tracking-tight text-white text-left">證件與帳戶上傳</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-[#0d1117] p-6 rounded-3xl border border-slate-800 shadow-inner">
                                            <InputField label="🏛 銀行名稱" placeholder="例如：國泰世華" value={formData.bankName} onChange={val => handleInputChange('bankName', val)} />
                                            <InputField label="💳 銀行帳號" placeholder="請輸入完整數字" value={formData.bankAccount} onChange={val => handleInputChange('bankAccount', val)} />
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                            {[
                                                { id: 'idFront', label: '身分證正面' },
                                                { id: 'idBack', label: '身分證反面' },
                                                { id: 'bankPassbook', label: '存摺封面' }
                                            ].map(item => (
                                                <div key={item.id} className="relative aspect-[4/3] bg-[#0d1117] border border-slate-800 rounded-2xl flex flex-col items-center justify-center overflow-hidden hover:border-orange-500/50 transition-all cursor-pointer group shadow-inner">
                                                    <input type="file" accept="image/*" onChange={e => handleFileChange(e, item.id)} className="absolute inset-0 opacity-0 z-20 cursor-pointer" />
                                                    {formData[item.id] ? (
                                                        <div className="w-full h-full relative">
                                                            <img src={formData[item.id]} className="w-full h-full object-cover" />
                                                            <div className="absolute top-2 right-2 bg-green-500 text-white p-1 rounded-full shadow-lg"><Icons.Check className="w-3 h-3" /></div>
                                                        </div>
                                                    ) : (
                                                        <div className="text-center px-2">
                                                            <Icons.Camera className="w-8 h-8 mx-auto mb-3 text-slate-700 group-hover:text-orange-500 transition-colors" />
                                                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{item.label}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className="flex items-start gap-4 p-5 bg-orange-500/5 border border-orange-500/10 rounded-2xl">
                                            <Icons.Shield className="w-6 h-6 text-orange-500 shrink-0" />
                                            <p className="text-[12px] font-bold text-orange-200/70 leading-relaxed text-left">安全提示：所有影像將覆蓋「供日央水原交易審核用」防偽浮水印。</p>
                                        </div>

                                        <div className="bg-[#0d1117] border border-slate-800 rounded-2xl p-6 space-y-4 text-[13px] text-slate-400 text-left">
                                            <label className="flex items-start gap-4 cursor-pointer select-none">
                                                <input type="checkbox" className="mt-1 w-5 h-5 rounded border-slate-700 bg-slate-800 text-orange-500 focus:ring-0" checked={checks.nameMatch} onChange={e => setChecks({...checks, nameMatch: e.target.checked})} />
                                                <span className={checks.nameMatch ? 'text-white font-bold' : ''}>我保證以上資訊均屬實無誤，並願意承擔法律責任。</span>
                                            </label>
                                            <label className="flex items-start gap-4 cursor-pointer select-none">
                                                <input type="checkbox" className="mt-1 w-5 h-5 rounded border-slate-700 bg-slate-800 text-orange-500 focus:ring-0" checked={checks.qualityOk} onChange={e => setChecks({...checks, qualityOk: e.target.checked})} />
                                                <span className={checks.qualityOk ? 'text-white font-bold' : ''}>我確認上傳影像清晰可辨識，無遮擋或反光情形。</span>
                                            </label>
                                        </div>

                                        <div className="flex gap-4">
                                            <button type="button" onClick={() => setCurrentStep(1)} className="flex-1 py-5 border border-slate-800 text-slate-500 rounded-2xl font-black uppercase tracking-widest hover:bg-slate-800 transition-all text-sm">返回</button>
                                            <button 
                                                type="button" 
                                                onClick={handleSubmit} 
                                                disabled={loading} 
                                                className={`flex-[2] py-5 rounded-2xl font-black uppercase tracking-widest transition-all text-sm shadow-xl flex items-center justify-center gap-3 ${loading ? 'bg-slate-700 text-slate-400' : 'bg-orange-500 text-black hover:bg-orange-400 active:scale-95'}`}
                                            >
                                                {loading ? <Icons.Loader /> : "確認並上傳"}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                              <footer class="mt-auto border-t border-white/5 bg-slate-900/50 pt-16 pb-8">
        <div class="max-w-4xl mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-12">
                <div>
                    <h4 class="text-white font-bold mb-4">關於日央水原</h4>
                    <p class="text-slate-400 text-sm leading-relaxed">
                        日央水原致力於提供最安全的天幣買賣管道及各伺服器實時匯率查詢。我們的 DD373 代購服務由資深團隊經營，保證流程透明、速度領先。
                    </p>
                </div>
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>
                        <h4 class="text-slate-500 font-bold mb-4 uppercase tracking-widest text-xs">法律資訊</h4>
                        <ul class="space-y-2">
                           <li><a href="./legal.html?page=terms" class="text-slate-400 hover:text-blue-400 transition-colors">服務條款</a></li>
                           <li><a href="./legal.html?page=risk" class="text-slate-400 hover:text-blue-400 transition-colors">風險揭露</a></li>
                           <li><a href="./legal.html?page=privacy" class="text-slate-400 hover:text-blue-400 transition-colors">隱私權政策</a></li>
                           <li><a href="./legal.html?page=aml" class="text-slate-400 hover:text-blue-400 transition-colors">反洗錢聲明</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4 class="text-slate-500 font-bold mb-4 uppercase tracking-widest text-xs">快速連結</h4>
                        <ul class="space-y-2">
                            <li><a href="index.html" class="text-slate-400 hover:text-blue-400 transition-colors">即時報價</a></li>
                            <li><a href="kyc.html" class="text-slate-400 hover:text-blue-400 transition-colors">實名認證</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="border-t border-white/5 pt-8 text-center">
                <div class="text-[10px] text-slate-600 font-bold tracking-[0.2em] uppercase">
                    © 2026 日央水原 • 專業天幣買賣與 DD373 代購首選 • 謹防詐騙 • 請認明官方 LINE @321enghh
                </div>
            </div>
        </div>
    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
